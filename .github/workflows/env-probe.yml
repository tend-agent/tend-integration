name: env-probe
on:
  push:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    environment:
      name: probe-env
      deployment: false
    steps:
      - name: report secret availability
        env:
          S: ${{ secrets.PROBE_SECRET }}
        run: |
          echo "event=$GITHUB_EVENT_NAME ref=$GITHUB_REF"
          if [ -n "$S" ]; then echo "RESULT=HAS_SECRET"; else echo "RESULT=NO_SECRET"; fi
