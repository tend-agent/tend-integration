name: probe-review
on:
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created, edited]
  issue_comment:
    types: [created]
jobs:
  refprobe:
    runs-on: ubuntu-latest
    steps:
      - run: echo "REFPROBE event=$GITHUB_EVENT_NAME ref=$GITHUB_REF sha=$GITHUB_SHA"
  gated:
    runs-on: ubuntu-latest
    environment:
      name: probe-env
      deployment: false
    steps:
      - env:
          S: ${{ secrets.PROBE_SECRET }}
        run: |
          echo "GATEDPROBE event=$GITHUB_EVENT_NAME ref=$GITHUB_REF"
          if [ -n "$S" ]; then echo "RESULT=HAS_SECRET"; else echo "RESULT=NO_SECRET"; fi
